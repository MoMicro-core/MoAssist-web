  <g font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="13">
    <text x="266" y="486" fill="#7a90a8">1</text>
    <text x="290" y="486" fill="#94a8bd">&lt;!-- MoAssist · 1-line install · auto-detects theme --&gt;</text>

    <text x="266" y="514" fill="#7a90a8">2</text>
    <text x="290" y="514" fill="#5dd3df">&lt;script</text>
    <text x="354" y="514" fill="#94a8bd"> </text>
    <text x="362" y="514" fill="#fcd34d">async</text>
    <text x="406" y="514" fill="#94a8bd"> </text>
    <text x="414" y="514" fill="#fcd34d">src</text>
    <text x="438" y="514" fill="#94a8bd">=</text>
    <text x="446" y="514" fill="#86efac">"https://cdn.moassist.io/v2/widget.js"</text>

    <text x="266" y="542" fill="#7a90a8">3</text>
    <text x="290" y="542" fill="#94a8bd">        </text>
    <text x="362" y="542" fill="#fcd34d">data-bot</text>
    <text x="430" y="542" fill="#94a8bd">=</text>
    <text x="438" y="542" fill="#86efac">"aria-nordic-bloom"</text>

    <text x="266" y="570" fill="#7a90a8">4</text>
    <text x="290" y="570" fill="#94a8bd">        </text>
    <text x="362" y="570" fill="#fcd34d">data-key</text>
    <text x="430" y="570" fill="#94a8bd">=</text>
    <text x="438" y="570" fill="#86efac">"pk_live_•••••••••••••••3a2f9c"</text>

    <text x="266" y="598" fill="#7a90a8">5</text>
    <text x="290" y="598" fill="#94a8bd">        </text>
    <text x="362" y="598" fill="#fcd34d">data-theme</text>
    <text x="448" y="598" fill="#94a8bd">=</text>
    <text x="456" y="598" fill="#86efac">"auto"</text>
    <text x="500" y="598" fill="#94a8bd"> </text>
    <text x="508" y="598" fill="#fcd34d">data-position</text>
    <text x="612" y="598" fill="#94a8bd">=</text>
    <text x="620" y="598" fill="#86efac">"bottom-right"</text>

    <text x="266" y="626" fill="#7a90a8">6</text>
    <text x="290" y="626" fill="#94a8bd">        </text>
    <text x="362" y="626" fill="#fcd34d">data-locale</text>
    <text x="450" y="626" fill="#94a8bd">=</text>
    <text x="458" y="626" fill="#86efac">"auto"</text>
    <text x="502" y="626" fill="#94a8bd">&gt;&lt;/</text>
    <text x="526" y="626" fill="#5dd3df">script</text>
    <text x="580" y="626" fill="#94a8bd">&gt;</text>

    <text x="266" y="668" fill="#7a90a8">7</text>
    <text x="290" y="668" fill="#94a8bd">// Optional: pass logged-in customer + cart data</text>

    <text x="266" y="696" fill="#7a90a8">8</text>
    <text x="290" y="696" fill="#5dd3df">window</text>
    <text x="338" y="696" fill="#94a8bd">.</text>
    <text x="342" y="696" fill="#fcd34d">moAssist</text>
    <text x="408" y="696" fill="#94a8bd">.</text>
    <text x="412" y="696" fill="#fcd34d">identify</text>
    <text x="476" y="696" fill="#94a8bd">({ </text>
    <text x="498" y="696" fill="#86efac">email</text>
    <text x="538" y="696" fill="#94a8bd">: </text>
    <text x="554" y="696" fill="#86efac">customer.email</text>
    <text x="668" y="696" fill="#94a8bd">, </text>
    <text x="684" y="696" fill="#86efac">order_id</text>
    <text x="746" y="696" fill="#94a8bd">: </text>
    <text x="762" y="696" fill="#86efac">order.id</text>
    <text x="822" y="696" fill="#94a8bd">});</text>

    <text x="266" y="724" fill="#7a90a8">9</text>
    <text x="290" y="724" fill="#94a8bd">// That's it. Aria adapts to your theme automatically.</text>
