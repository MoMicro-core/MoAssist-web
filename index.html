<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>MoAssist</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Albert+Sans:wght@400;500;600;700&family=Sora:wght@500;600;700&display=swap"
      rel="stylesheet"
    />
    <script>
      window.__MOMICRO_BASE__ = "%VITE_API_URL%"
    </script>
    <script type="module">
      const raw = window.__MOMICRO_BASE__ || ''
      const base = raw && !raw.startsWith('%') ? raw.replace(/\/$/, '') : ''
      const src = base ? `${base}/v1/public/runtime-config.js` : '/v1/public/runtime-config.js'
      const script = document.createElement('script')
      script.src = src
      script.defer = true
      document.head.appendChild(script)
    </script>
  </head>
  <body class="min-h-screen">
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
