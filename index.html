<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>
      AI Chatbot for Ecommerce | Reduce Support Costs 70% | MoAssist
    </title>

    <!-- ─── SEO ─────────────────────────────────────────────────────────── -->
    <!-- NOTE: these static values mirror the homepage; usePublicSeo overrides
         them per-route at runtime. Keep them in sync with the homepage so the
         pre-render snapshot crawlers/social bots read is already optimal. -->
    <meta
      name="description"
      content="AI chatbot for Shopify & ecommerce stores. Automate support, answer shipping & return questions instantly, and cut support costs up to 70%. Live in 5 min."
    />
    <meta
      name="keywords"
      content="online shop chatbot, ecommerce chatbot, sales chatbot, support chatbot, AI chatbot for business, lead capture chatbot, chatbot for customer portal, chatbot knowledge base, multilingual chatbot, branded website chatbot"
    />
    <meta name="language" content="English" />
    <meta name="author" content="MoMicro" />
    <meta name="category" content="Business Software, AI, SaaS" />
    <meta
      name="robots"
      content="index,follow,max-image-preview:large,max-snippet:-1,max-video-preview:-1"
    />

    <!-- Canonical & hreflang are updated by usePublicSeo on every navigation -->
    <link rel="canonical" href="https://momicro.com/" />
    <link rel="alternate" hreflang="x-default" href="https://momicro.com/" />
    <link rel="alternate" hreflang="en"    href="https://momicro.com/" />
    <link rel="alternate" hreflang="de-DE" href="https://momicro.com/de" />
    <link rel="alternate" hreflang="es-ES" href="https://momicro.com/es" />
    <link rel="alternate" hreflang="fr-FR" href="https://momicro.com/fr" />
    <link rel="alternate" hreflang="it-IT" href="https://momicro.com/it" />
    <link rel="alternate" hreflang="ru-RU" href="https://momicro.com/ru" />
    <link rel="alternate" hreflang="uk-UA" href="https://momicro.com/ua" />

    <!-- ─── Open Graph ───────────────────────────────────────────────────── -->
    <meta
      property="og:title"
      content="AI Chatbot for Ecommerce | Reduce Support Costs 70% | MoAssist"
    />
    <meta property="og:site_name" content="MoAssist" />
    <meta
      property="og:description"
      content="Automate 80% of your ecommerce customer questions. MoAssist handles shipping, returns, and product info 24/7 — so you sell more and spend less on support."
    />
    <meta property="og:locale"           content="en_US" />
    <meta property="og:locale:alternate" content="de_DE" />
    <meta property="og:locale:alternate" content="es_ES" />
    <meta property="og:locale:alternate" content="fr_FR" />
    <meta property="og:locale:alternate" content="it_IT" />
    <meta property="og:locale:alternate" content="ru_RU" />
    <meta property="og:locale:alternate" content="uk_UA" />
    <!-- JPEG OG image (SVG is not supported by most social crawlers) -->
    <meta property="og:image"        content="https://momicro.com/preview/og-image.jpg" />
    <meta property="og:image:type"   content="image/jpeg" />
    <meta property="og:image:width"  content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:image:alt"    content="MoAssist – AI Chatbot for Ecommerce" />
    <meta property="og:type"         content="website" />
    <meta property="og:url"          content="https://momicro.com/" />

    <!-- ─── Twitter Card ────────────────────────────────────────────────── -->
    <meta name="twitter:card"        content="summary_large_image" />
    <meta name="twitter:title"       content="AI Chatbot for Ecommerce | Reduce Support Costs 70% | MoAssist" />
    <meta name="twitter:description" content="AI chatbot for Shopify stores. Reduce support costs by 70%, answer questions instantly, and increase conversions. Setup in under 5 minutes." />
    <meta name="twitter:image"       content="https://momicro.com/preview/og-image.jpg" />

    <!-- ─── PWA / Icons ─────────────────────────────────────────────────── -->
    <meta name="theme-color" content="#099ad9" />
    <!-- SVG favicon removed — it contained a 345 KB embedded PNG; use .png/.ico instead -->
    <link rel="icon"             type="image/png" href="/favicon-96x96.png" sizes="96x96" />
    <link rel="shortcut icon"    href="/favicon.ico" />
    <link rel="apple-touch-icon" sizes="180x180"  href="/apple-touch-icon.png" />
    <meta name="apple-mobile-web-app-title" content="MoAssist" />
    <link rel="manifest" href="/site.webmanifest" />

    <!-- ─── Fonts ───────────────────────────────────────────────────────── -->
    <!-- Step 1: open the TCP connection early -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <!-- Step 2: load font CSS non-blocking (display=swap is already in the URL) -->
    <link
      rel="preload"
      as="style"
      href="https://fonts.googleapis.com/css2?family=Albert+Sans:wght@400;500;600;700&family=Sora:wght@500;600;700&display=swap"
    />
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Albert+Sans:wght@400;500;600;700&family=Sora:wght@500;600;700&display=swap"
      media="print"
      onload="this.media='all'"
    />
    <noscript>
      <link
        rel="stylesheet"
        href="https://fonts.googleapis.com/css2?family=Albert+Sans:wght@400;500;600;700&family=Sora:wght@500;600;700&display=swap"
      />
    </noscript>

    <!-- ─── Critical resource hints ─────────────────────────────────────── -->
    <!-- Hero image: preloaded before React boots so LCP is not delayed -->
    <link
      rel="preload"
      as="image"
      href="/preview/ready-chatbot-hero-light.svg"
      fetchpriority="high"
    />
    <!-- DNS prefetch for analytics (lower priority than preconnect) -->
    <link rel="dns-prefetch" href="https://va.vercel-scripts.com" />

    <!-- ─── Structured Data ──────────────────────────────────────────────── -->
    <!-- Static Organization + WebSite for non-JS crawlers. The richer
         SoftwareApplication + FAQ schema is injected per-page by Landing.jsx;
         keeping different @types here avoids duplicate-entity confusion. -->
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@graph": [
          {
            "@type": "Organization",
            "@id": "https://momicro.com/#organization",
            "name": "MoMicro",
            "alternateName": "MoAssist",
            "url": "https://momicro.com/",
            "logo": "https://momicro.com/preview/logo.svg",
            "description": "MoMicro is the organization behind MoAssist, the AI chatbot for ecommerce and Shopify stores."
          },
          {
            "@type": "WebSite",
            "@id": "https://momicro.com/#website",
            "url": "https://momicro.com/",
            "name": "MoAssist",
            "alternateName": "MoMicro",
            "publisher": { "@id": "https://momicro.com/#organization" },
            "inLanguage": ["en", "de-DE", "es-ES", "fr-FR", "it-IT", "ru-RU", "uk-UA"]
          }
        ]
      }
    </script>
  </head>
  <body class="min-h-screen">
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
    <!-- The MoAssist chat widget is injected by src/components/ChatWidget.jsx
         (public pages only, in the visitor's language). Do not re-add it here. -->
  </body>
</html>
