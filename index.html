    <script>
      window.__MOMICRO_BASE__ = "%VITE_API_URL%";

    <script type="module">
      const raw = window.__MOMICRO_BASE__ || "";
      const base = raw && !raw.startsWith("%") ? raw.replace(/\/$/, "") : "";
      const src = base
        ? `${base}/v1/public/runtime-config.js`
        : "/v1/public/runtime-config.js";
      const script = document.createElement("script");
      script.src = src;
      script.defer = true;
      document.head.appendChild(script);
